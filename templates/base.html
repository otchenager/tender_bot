<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Тендер-бот{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body       { background:#f5f6f8; font-size:15px; color:#1a1a1a; }
    .topnav    { background:#fff; border-bottom:.5px solid #dde0e6;
                 padding:0 2rem; display:flex; align-items:center; gap:2rem; height:56px; }
    .topnav-brand { font-weight:700; font-size:1.05rem; color:#1a1a1a; text-decoration:none; }
    .topnav a  { color:#555; text-decoration:none; font-size:.95rem;
                 padding:4px 0; border-bottom:2px solid transparent; }
    .topnav a.active { color:#1a1a1a; font-weight:600; border-bottom:2px solid #1a1a1a; }
    .topnav a:hover  { color:#1a1a1a; }
    .page      { padding:1.8rem 2rem; }
    .card      { background:#fff; border:.5px solid #dde0e6; border-radius:8px; box-shadow:none; }

    /* Status dots */
    .dot-green  { display:inline-block; width:10px; height:10px;
                  background:#22c55e; border-radius:50%; margin-right:5px; }
    .dot-yellow { display:inline-block; width:10px; height:10px;
                  background:#f59e0b; border-radius:50%; margin-right:5px; }
    .dot-grey   { display:inline-block; width:10px; height:10px;
                  background:#9ca3af; border-radius:50%; margin-right:5px; }

    /* Pills */
    .pill-green  { display:inline-block; background:#e6f9ec; color:#1a6b2a;
                   padding:2px 10px; border-radius:20px; font-weight:600;
                   white-space:nowrap; font-size:.9rem; }
    .pill-yellow { display:inline-block; background:#fef9c3; color:#92400e;
                   padding:2px 10px; border-radius:20px; font-weight:600;
                   white-space:nowrap; font-size:.9rem; }
    .pill-grey   { display:inline-block; background:#f1f5f9; color:#64748b;
                   padding:2px 10px; border-radius:20px;
                   white-space:nowrap; font-size:.9rem; }
    .pill-red    { display:inline-block; background:#fde8e8; color:#a61c1c;
                   padding:2px 10px; border-radius:20px; font-weight:600;
                   white-space:nowrap; font-size:.9rem; }

    /* Metric cards */
    .metric-card { padding:1.2rem 1.5rem; }
    .metric-label{ font-size:.75rem; color:#888; text-transform:uppercase;
                   letter-spacing:.05em; margin-bottom:4px; }
    .metric-value{ font-size:1.8rem; font-weight:700; line-height:1.1; }
    .metric-green{ color:#16a34a; }
    .metric-red  { color:#dc2626; }

    /* Tables */
    table   { font-size:14px; }
    th      { font-weight:600; color:#666; font-size:11px;
              text-transform:uppercase; letter-spacing:.04em; }
    tbody tr:hover { background:#fafbfc; }
    tr.row-green td { background:#f0fdf4; }
    tr.row-yellow td{ background:#fefce8; }
    tr.row-grey td  { color:#9ca3af; }

    /* Badge */
    .badge-unknown { font-size:.7rem; background:#fde68a; color:#92400e;
                     padding:1px 5px; border-radius:4px; margin-left:4px; }

    /* Price list toggle */
    .item-inactive { opacity:.35; }

    /* Chat */
    #chat-box { height:420px; overflow-y:auto; background:#f8fafc;
                border:.5px solid #dde0e6; border-radius:8px; padding:1rem; }
    .msg-user { text-align:right; margin-bottom:.75rem; }
    .msg-bot  { text-align:left; margin-bottom:.75rem; }
    .bubble   { display:inline-block; padding:.55rem .9rem;
                border-radius:12px; max-width:80%; line-height:1.5; }
    .bubble-user { background:#1a1a1a; color:#fff; }
    .bubble-bot  { background:#fff; border:.5px solid #dde0e6; }

    /* Funnel */
    .funnel-row { display:flex; align-items:center; gap:.5rem;
                  padding:.35rem 0; font-size:.92rem; }
    .funnel-cnt { min-width:2.5rem; font-weight:700; color:#1a1a1a; }
  </style>
</head>
<body>
<nav class="topnav">
  <a class="topnav-brand" href="/">🏗 Тендер-бот</a>
  <a href="/"         class="{{ 'active' if active_tab=='tenders'  else '' }}">Подходящие</a>
  <a href="/prices"   class="{{ 'active' if active_tab=='prices'   else '' }}">Мой прайс</a>
  <a href="/settings" class="{{ 'active' if active_tab=='settings' else '' }}">Параметры</a>
  <a href="/chat"     class="{{ 'active' if active_tab=='chat'     else '' }}">AI-ассистент</a>
</nav>
<div class="page">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
