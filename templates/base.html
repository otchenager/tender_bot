<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Тендер-бот{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ================= Design tokens ================= */
    :root {
      --bg:        #f5f6f8;
      --surface:   #ffffff;
      --border:    #e6e8ee;
      --ink:       #171b26;
      --ink-2:     #4b5565;
      --muted:     #8a94a6;
      --accent:    #d97706;   /* construction amber */
      --accent-ink:#92400e;
      --accent-bg: #fdf3d8;
      --good:      #15803d;
      --good-bg:   #e8f7ee;
      --warn:      #b45309;
      --warn-bg:   #fdf3d8;
      --bad:       #b91c1c;
      --bad-bg:    #fdeaea;
      --neutral-bg:#eef1f5;
      --radius:    12px;
      --shadow:    0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.08);
      --shadow-lg: 0 4px 12px rgba(16,24,40,.10);
    }

    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    h1,h2,h3,h4,h5,h6 { font-weight: 700; letter-spacing: -.01em; }

    /* ================= Top navigation ================= */
    .topnav {
      background: var(--ink);
      padding: 0 2rem;
      display: flex; align-items: center; gap: 1.75rem;
      height: 60px;
      position: sticky; top: 0; z-index: 100;
    }
    .topnav-brand {
      display: flex; align-items: center; gap: .6rem;
      font-weight: 800; font-size: 1.02rem; color: #fff;
      text-decoration: none; margin-right: .75rem; letter-spacing: -.01em;
    }
    .topnav-brand:hover { color:#fff; }
    .brand-mark {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .topnav a.nav-item-link {
      color: #9aa4b2; text-decoration: none; font-size: .93rem; font-weight: 500;
      padding: 19px 2px 17px; border-bottom: 2px solid transparent;
      transition: color .15s ease;
    }
    .topnav a.nav-item-link.active { color: #fff; font-weight: 600; border-bottom-color: var(--accent); }
    .topnav a.nav-item-link:hover { color: #fff; }

    .page { padding: 1.9rem 2rem 3rem; max-width: 1240px; margin: 0 auto; animation: pageIn .28s ease both; }
    @keyframes pageIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ================= Surfaces ================= */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .card-header-flat {
      padding: .95rem 1.3rem; border-bottom: 1px solid var(--border);
      font-weight: 600; font-size: .95rem;
      display: flex; align-items: baseline; gap: .5rem; flex-wrap: wrap;
    }

    .section-label {
      font-size: .72rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: .07em; font-weight: 600;
    }

    /* ================= Pills & badges ================= */
    .pill { display: inline-block; padding: 3px 11px; border-radius: 999px;
            font-weight: 600; white-space: nowrap; font-size: .84rem; }
    .pill-green  { background: var(--good-bg);   color: var(--good); }
    .pill-yellow { background: var(--warn-bg);   color: var(--warn); }
    .pill-grey   { background: var(--neutral-bg); color: var(--muted); font-weight: 500; }
    .pill-red    { background: var(--bad-bg);    color: var(--bad); }

    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; vertical-align: 1px; }
    .dot-green  { background: #22c55e; }
    .dot-yellow { background: #f59e0b; }
    .dot-grey   { background: #9ca3af; }

    /* ================= Score ring (SVG) ================= */
    .score-ring { position: relative; width: 64px; height: 64px; flex: none; }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring .ring-val {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; line-height: 1;
    }
    .score-ring .ring-num { font-weight: 800; font-size: 1.15rem; letter-spacing: -.02em; }
    .score-ring .ring-cap { font-size: .58rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

    /* ================= Meter bars (K/L/M) ================= */
    .meter { display: flex; align-items: center; gap: .55rem; font-size: .8rem; }
    .meter-label { width: 14px; font-weight: 700; color: var(--ink-2); }
    .meter-track { flex: 1; height: 6px; background: var(--neutral-bg); border-radius: 999px; overflow: hidden; }
    .meter-fill  { height: 100%; border-radius: 999px; transition: width .5s ease; }
    .meter-num   { width: 44px; text-align: right; font-weight: 600; color: var(--ink-2); font-variant-numeric: tabular-nums; }

    /* ================= Tender cards ================= */
    .tender-card {
      display: block; text-decoration: none; color: inherit;
      background: var(--surface); border: 1px solid var(--border);
      border-left: 4px solid var(--tier, var(--border));
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 1.15rem 1.35rem;
      transition: box-shadow .18s ease, transform .18s ease;
      animation: pageIn .3s ease both;
    }
    .tender-card:hover { color: inherit; box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .tender-title { font-weight: 700; font-size: 1.02rem; line-height: 1.35; letter-spacing: -.01em; }
    .tender-meta  { font-size: .82rem; color: var(--muted); margin-top: .3rem;
                    display: flex; gap: 1rem; flex-wrap: wrap; }
    .tender-meta svg { vertical-align: -2px; margin-right: 3px; }
    .tender-budget { font-weight: 800; font-size: 1.12rem; letter-spacing: -.01em; font-variant-numeric: tabular-nums; }
    .tender-budget small { font-weight: 600; color: var(--muted); font-size: .72em; }

    /* ================= Metric cards (detail page) ================= */
    .metric-card { padding: 1.15rem 1.4rem; }
    .metric-label{ font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; font-weight: 600; }
    .metric-value{ font-size: 1.75rem; font-weight: 800; line-height: 1.1; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
    .metric-green{ color: var(--good); }
    .metric-red  { color: var(--bad); }

    /* ================= Tables ================= */
    table { font-size: 14px; }
    th { font-weight: 600; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
    tbody tr { transition: background .12s ease; }
    tbody tr:hover { background: #fafbfc; }
    tr.row-green td { background: #f2faf5; }
    tr.row-yellow td{ background: #fdf9ec; }
    tr.row-grey td  { color: var(--muted); }

    .badge-unknown { font-size: .68rem; background: var(--accent-bg); color: var(--accent-ink);
                     padding: 1px 6px; border-radius: 5px; margin-left: 4px; font-weight: 700; }
    .item-inactive { opacity: .38; }

    /* ================= Buttons ================= */
    .btn-dark { background: var(--ink); border-color: var(--ink); font-weight: 600;
                border-radius: 9px; padding: .5rem 1.15rem; }
    .btn-dark:hover { background: #262c3d; border-color: #262c3d; }
    .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff;
                  font-weight: 600; border-radius: 9px; }
    .btn-accent:hover { background: #b45309; border-color: #b45309; color: #fff; }

    /* ================= Sliders ================= */
    input[type=range].slider { -webkit-appearance: none; appearance: none; width: 100%;
      height: 6px; border-radius: 999px; outline: none;
      background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--fill, 50%), var(--neutral-bg) var(--fill, 50%), var(--neutral-bg) 100%); }
    input[type=range].slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
      width: 20px; height: 20px; border-radius: 50%; background: #fff;
      border: 2.5px solid var(--accent); box-shadow: var(--shadow); cursor: grab; }
    input[type=range].slider::-moz-range-thumb {
      width: 20px; height: 20px; border-radius: 50%; background: #fff;
      border: 2.5px solid var(--accent); box-shadow: var(--shadow); cursor: grab; }

    .region-chip { user-select: none; }
    .region-chip input { display: none; }
    .region-chip span {
      display: inline-block; padding: 6px 14px; border-radius: 999px;
      border: 1.5px solid var(--border); background: var(--surface);
      font-size: .88rem; font-weight: 500; color: var(--ink-2);
      cursor: pointer; transition: all .15s ease;
    }
    .region-chip input:checked + span {
      background: var(--ink); border-color: var(--ink); color: #fff; font-weight: 600;
    }
    .region-chip span:hover { border-color: var(--ink-2); }

    /* ================= Chat ================= */
    #chat-box { height: 460px; overflow-y: auto; background: var(--surface);
                border: 1px solid var(--border); border-radius: var(--radius);
                box-shadow: var(--shadow); padding: 1.25rem; scroll-behavior: smooth; }
    .msg-user { text-align: right; margin-bottom: .8rem; animation: msgIn .25s ease both; }
    .msg-bot  { text-align: left;  margin-bottom: .8rem; animation: msgIn .25s ease both; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .bubble { display: inline-block; padding: .65rem 1rem; border-radius: 16px;
              max-width: 82%; line-height: 1.55; text-align: left; font-size: .95rem; }
    .bubble-user { background: var(--ink); color: #fff; border-bottom-right-radius: 5px; }
    .bubble-bot  { background: var(--bg); border: 1px solid var(--border); border-bottom-left-radius: 5px; }

    .typing-dots { display: inline-flex; gap: 5px; padding: .55rem .3rem; }
    .typing-dots i { width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
                     animation: bounce 1.2s infinite ease-in-out; }
    .typing-dots i:nth-child(2) { animation-delay: .15s; }
    .typing-dots i:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%, 60%, 100% { transform: none; opacity: .5; }
                        30% { transform: translateY(-5px); opacity: 1; } }

    /* ================= Funnel ================= */
    .funnel-row { display: flex; align-items: center; gap: .6rem; padding: .4rem 0; font-size: .9rem; }
    .funnel-cnt { min-width: 2.6rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .funnel-bar { height: 5px; border-radius: 999px; background: var(--neutral-bg); flex: 1; overflow: hidden; }
    .funnel-bar i { display: block; height: 100%; background: var(--muted); border-radius: 999px; }

    /* ================= Misc ================= */
    .empty-state { padding: 3.5rem 1rem; text-align: center; color: var(--muted); }
    .empty-state .es-icon { font-size: 2.2rem; margin-bottom: .6rem; opacity: .7; }
    ::selection { background: var(--accent-bg); }
  </style>
</head>
<body>
<nav class="topnav">
  <a class="topnav-brand" href="/">
    <span class="brand-mark">🏗</span> Тендер-бот
  </a>
  <a href="/"         class="nav-item-link {{ 'active' if active_tab=='tenders'  else '' }}">Подходящие</a>
  <a href="/prices"   class="nav-item-link {{ 'active' if active_tab=='prices'   else '' }}">Мой прайс</a>
  <a href="/settings" class="nav-item-link {{ 'active' if active_tab=='settings' else '' }}">Параметры</a>
  <a href="/chat"     class="nav-item-link {{ 'active' if active_tab=='chat'     else '' }}">AI-ассистент</a>
</nav>
<div class="page">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
